# Production override. Use WITH the base file:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# vs the dev base file, this:
#   - builds the self-contained prod image (Dockerfile.prod) — no code bind mounts
#   - removes datastore host port mappings (Postgres/Redis/MinIO stay on asip_net)
#   - requires real secrets (fails fast if unset — no insecure defaults)
#   - drops MailHog (configure real SMTP via MAIL_* env)
#   - sets per-service resource limits
#
# Provide secrets via a production .env (APP_ENV=production, APP_DEBUG=false,
# SESSION_SECURE_COOKIE=true, LOG_CHANNEL=stderr) or your orchestrator's secret store.

services:

  nginx:
    volumes:
      # Only the nginx config; the app code is baked into the app image, not shared.
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    deploy:
      resources:
        limits: { cpus: "1", memory: 256M }

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.prod
    image: asip-app:prod
    volumes: []          # no bind mount — run the baked code
    deploy:
      resources:
        limits: { cpus: "2", memory: 1G }

  horizon:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.prod
    image: asip-app:prod
    volumes: []
    deploy:
      resources:
        limits: { cpus: "2", memory: 1G }

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.prod
    image: asip-app:prod
    volumes: []
    deploy:
      resources:
        limits: { cpus: "0.5", memory: 256M }

  postgres:
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required in production}
    ports: !reset []     # do not publish to the host
    deploy:
      resources:
        limits: { cpus: "2", memory: 1G }

  redis:
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required in production}
    ports: !reset []
    deploy:
      resources:
        limits: { cpus: "1", memory: 512M }

  minio:
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required in production}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required in production}
    # Keep 9000/9001 published only if the browser/CDN reaches MinIO directly;
    # otherwise front it with TLS. Reset here and re-add intentionally per deploy.
    ports: !reset []
    deploy:
      resources:
        limits: { cpus: "1", memory: 512M }

  # MailHog is a dev-only mail catcher — remove it in production.
  mailhog:
    deploy:
      replicas: 0
