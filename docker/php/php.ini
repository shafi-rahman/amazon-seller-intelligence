upload_max_filesize = 55M
post_max_size = 60M
memory_limit = 512M
max_execution_time = 300

; Send PHP errors to the container's stderr (captured by `docker logs` / log
; aggregation) rather than swallowing them. display_errors stays off so errors
; are never rendered into HTTP responses.
log_errors = On
error_log = /proc/self/fd/2
display_errors = Off

opcache.enable = 1
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 8
opcache.max_accelerated_files = 10000
opcache.revalidate_freq = 0
; Dev default: pick up edited files (bind-mounted code). The production image sets
; opcache.validate_timestamps = 0 (see Dockerfile prod stage) for a cached, immutable build.
opcache.validate_timestamps = 1
