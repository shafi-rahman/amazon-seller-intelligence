networks:
  asip_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:

services:

  nginx:
    image: nginx:alpine
    container_name: asip_nginx
    ports:
      - "80:80"
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - asip_net
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: asip_app
    volumes:
      - ./:/var/www/html
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    networks:
      - asip_net
    restart: unless-stopped

  horizon:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: asip_horizon
    command: php artisan horizon
    volumes:
      - ./:/var/www/html
    depends_on:
      - app
    networks:
      - asip_net
    restart: unless-stopped

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: asip_scheduler
    command: php artisan schedule:work
    volumes:
      - ./:/var/www/html
    depends_on:
      - app
    networks:
      - asip_net
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    container_name: asip_postgres
    environment:
      POSTGRES_DB: ${DB_DATABASE:-asip}
      POSTGRES_USER: ${DB_USERNAME:-asip}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-asip} -d ${DB_DATABASE:-asip}"]
      interval: 5s
      timeout: 5s
      retries: 15
    networks:
      - asip_net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: asip_redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-secret}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - asip_net
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: asip_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-asip}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-secret123}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - asip_net
    restart: unless-stopped

  mailhog:
    image: mailhog/mailhog:latest
    container_name: asip_mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - asip_net
    restart: unless-stopped
